<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="any" href="/quran.png">
    <title>القرآن الكريم - Holy Quran</title>
    <meta name="description" content="Experience the Holy Quran with beautiful recitations, translations, and an immersive spiritual interface">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #d4af37;
            --primary-emerald: #2d5f4f;
            --deep-teal: #1a4038;
            --soft-cream: #f9f6f0;
            --dark-bg: #0a1612;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.1);
            --shadow-intense: 0 20px 60px rgba(0, 0, 0, 0.3);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a1612 0%, #1a4038 50%, #2d5f4f 100%);
            color: var(--soft-cream);
            overflow-x: hidden;
            transition: var(--transition-smooth);
        }

        body.light-mode {
            background: linear-gradient(135deg, #f9f6f0 0%, #e8dcc8 50%, #d4c4a8 100%);
            color: #1a4038;
        }

        /* Animated Background Particles */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Geometric Pattern Overlay */
        .geometric-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(45, 95, 79, 0.05) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Main Container */
        .app-container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* Header with Glassmorphism */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px 32px;
            margin-bottom: 32px;
            box-shadow: var(--shadow-soft);
            transition: var(--transition-smooth);
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header:hover {
            box-shadow: var(--shadow-intense);
            transform: translateY(-2px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #f4e5b5 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text h1 {
            font-family: 'Amiri', serif;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #f4e5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 13px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* Control Panel */
        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-button {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--soft-cream);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .icon-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .icon-button:hover::before {
            width: 120px;
            height: 120px;
        }

        .icon-button:hover {
            background: rgba(212, 175, 55, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        body.light-mode .icon-button {
            background: rgba(45, 95, 79, 0.1);
            color: var(--deep-teal);
        }

        body.light-mode .icon-button:hover {
            background: rgba(45, 95, 79, 0.2);
        }

        /* Search Bar */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 32px auto;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-input {
            width: 100%;
            padding: 18px 56px 18px 24px;
            border-radius: 16px;
            border: 2px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            color: var(--soft-cream);
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: var(--transition-smooth);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .search-input::placeholder {
            color: rgba(249, 246, 240, 0.5);
        }

        body.light-mode .search-input {
            color: var(--deep-teal);
            background: rgba(255, 255, 255, 0.6);
        }

        body.light-mode .search-input::placeholder {
            color: rgba(26, 64, 56, 0.5);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--primary-gold);
            pointer-events: none;
        }

        /* Main Content Grid */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 24px;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        /* Sidebar - Surah List */
        .sidebar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            height: fit-content;
            max-height: 800px;
            overflow-y: auto;
            box-shadow: var(--shadow-soft);
            transition: var(--transition-smooth);
        }

        .sidebar:hover {
            box-shadow: var(--shadow-intense);
        }

        .sidebar-title {
            font-family: 'Amiri', serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #f4e5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .surah-list {
            list-style: none;
        }

        .surah-item {
            padding: 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .surah-item:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.3);
            transform: translateX(-4px);
        }

        .surah-item.active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2) 0%, rgba(45, 95, 79, 0.2) 100%);
            border-color: var(--primary-gold);
        }

        .surah-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .surah-number {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--primary-gold);
            color: var(--dark-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .surah-name-ar {
            font-family: 'Amiri', serif;
            font-size: 18px;
            font-weight: 700;
        }

        .surah-meta {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Reading Area */
        .reading-area {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            min-height: 600px;
            box-shadow: var(--shadow-soft);
            transition: var(--transition-smooth);
        }

        .reading-area:hover {
            box-shadow: var(--shadow-intense);
        }

        .surah-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
        }

        .surah-header h2 {
            font-family: 'Amiri', serif;
            font-size: 36px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary-gold) 0%, #f4e5b5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .surah-details {
            display: flex;
            justify-content: center;
            gap: 24px;
            font-size: 14px;
            opacity: 0.8;
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 32px;
            text-align: center;
            margin: 32px 0;
            color: var(--primary-gold);
            animation: fadeIn 1.2s ease-out;
        }

        .ayah-container {
            margin-bottom: 32px;
        }

        .ayah {
            font-family: 'Amiri', serif;
            font-size: 28px;
            line-height: 2.2;
            text-align: justify;
            padding: 24px;
            border-radius: 12px;
            transition: var(--transition-smooth);
            cursor: pointer;
            position: relative;
        }

        .ayah:hover {
            background: rgba(212, 175, 55, 0.08);
        }

        .ayah.playing {
            background: rgba(212, 175, 55, 0.15);
            border-left: 4px solid var(--primary-gold);
            animation: highlight 2s ease-in-out infinite;
        }

        @keyframes highlight {
            0%, 100% { background: rgba(212, 175, 55, 0.15); }
            50% { background: rgba(212, 175, 55, 0.25); }
        }

        .ayah-number {
            display: inline-block;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary-gold);
            color: var(--dark-bg);
            text-align: center;
            line-height: 32px;
            font-size: 16px;
            margin: 0 8px;
            font-family: 'Cairo', sans-serif;
        }

        .ayah-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .ayah-container:hover .ayah-actions {
            opacity: 1;
        }

        .ayah-action-btn {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            background: rgba(212, 175, 55, 0.2);
            color: var(--soft-cream);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .ayah-action-btn:hover {
            background: rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        /* Audio Player */
        .audio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(180%);
            border-top: 1px solid var(--glass-border);
            padding: 20px;
            z-index: 1000;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.2);
            transform: translateY(100%);
            transition: var(--transition-smooth);
        }

        .audio-player.active {
            transform: translateY(0);
        }

        .player-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .player-info {
            flex: 1;
            min-width: 200px;
        }

        .player-surah {
            font-family: 'Amiri', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .player-reciter {
            font-size: 13px;
            opacity: 0.7;
        }

        .player-controls {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .player-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--primary-gold);
            color: var(--dark-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: var(--transition-bounce);
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.4);
        }

        .player-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.6);
        }

        .player-btn.play-pause {
            width: 56px;
            height: 56px;
            font-size: 24px;
        }

        .progress-container {
            flex: 2;
            min-width: 300px;
        }

        .progress-time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-gold) 0%, #f4e5b5 100%);
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            background: var(--primary-gold);
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.5);
        }

        .reciter-select {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--soft-cream);
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-width: 180px;
        }

        .reciter-select:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-gold);
        }

        .reciter-select option {
            background: var(--deep-teal);
            color: var(--soft-cream);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-gold);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #f4e5b5;
        }

        /* Loading Animation */
        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid rgba(212, 175, 55, 0.2);
            border-top-color: var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                max-height: 400px;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }

            .reading-area {
                padding: 24px 16px;
            }

            .ayah {
                font-size: 24px;
                padding: 16px;
            }

            .player-content {
                flex-direction: column;
                gap: 16px;
            }

            .progress-container {
                width: 100%;
            }

            .surah-header h2 {
                font-size: 28px;
            }
        }

        @media (max-width: 480px) {
            .logo-text h1 {
                font-size: 22px;
            }

            .ayah {
                font-size: 20px;
            }

            .bismillah {
                font-size: 24px;
            }
        }

        /* Bookmarks Panel */
        .bookmarks-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--glass-border);
            padding: 24px;
            overflow-y: auto;
            z-index: 999;
            transition: var(--transition-smooth);
            box-shadow: -8px 0 32px rgba(0, 0, 0, 0.3);
        }

        .bookmarks-panel.active {
            right: 0;
        }

        .bookmarks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
        }

        .bookmarks-header h3 {
            font-family: 'Amiri', serif;
            font-size: 24px;
            color: var(--primary-gold);
        }

        .bookmark-item {
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .bookmark-item:hover {
            background: rgba(212, 175, 55, 0.15);
            transform: translateX(-4px);
        }

        .bookmark-text {
            font-family: 'Amiri', serif;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .bookmark-reference {
            font-size: 12px;
            opacity: 0.7;
        }

        /* Notification Toast */
        .toast {
            position: fixed;
            top: 100px;
            right: -400px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            z-index: 9999;
            transition: var(--transition-smooth);
        }

        .toast.show {
            right: 24px;
        }

        /* Settings Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 9998;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow-intense);
            animation: scaleIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h3 {
            font-family: 'Amiri', serif;
            font-size: 28px;
            margin-bottom: 24px;
            text-align: center;
            color: var(--primary-gold);
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .setting-control {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--soft-cream);
            font-family: 'Cairo', sans-serif;
        }

        /* Font size slider */
        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-gold);
            cursor: pointer;
        }

        .slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-gold);
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="geometric-overlay"></div>

    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">☪</div>
                    <div class="logo-text">
                        <h1>القرآن الكريم</h1>
                        <p>The Holy Quran - Digital Experience</p>
                    </div>
                </div>
                <div class="controls">
                    <button class="icon-button" id="theme-toggle" title="Toggle Theme">🌙</button>
                    <button class="icon-button" id="bookmarks-btn" title="Bookmarks">📚</button>
                    <button class="icon-button" id="settings-btn" title="Settings">⚙️</button>
                </div>
            </div>
        </header>

        // Particle Animation System
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0;
        let mouseY = 0;

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Mouse interaction
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 150) {
                    const force = (150 - distance) / 150;
                    this.x -= dx * force * 0.01;
                    this.y -= dy * force * 0.01;
                }

                // Boundary check
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = Math.min(Math.floor((canvas.width * canvas.height) / 15000), 100);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // Draw connections
            particles.forEach((p1, i) => {
                particles.slice(i + 1).forEach(p2 => {
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < 100) {
                        ctx.strokeStyle = `rgba(212, 175, 55, ${(1 - distance / 100) * 0.2})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animateParticles);
        }

        // Mouse move tracking
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Load Quran data from API
        async function loadQuranData() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/quran/ar.alafasy');
                const data = await response.json();
                quranData.push(...data.data.surahs);
                renderSurahList();
                loadSurah(1);
            } catch (error) {
                console.error('Error loading Quran data:', error);
                showToast('Error loading Quran data. Please refresh the page.');
            }
        }

        // Render Surah List
        function renderSurahList() {
            const surahListEl = document.getElementById('surah-list');
            surahListEl.innerHTML = '';
            
            surahList.forEach((surah, index) => {
                const li = document.createElement('li');
                li.className = 'surah-item';
                if (surah.number === currentSurah) li.classList.add('active');
                
                li.innerHTML = `
                    <div class="surah-info">
                        <div class="surah-number">${surah.number}</div>
                        <div>
                            <div class="surah-name-ar">${surah.nameAr}</div>
                            <div class="surah-name-en" style="font-size: 12px; opacity: 0.7;">${surah.nameEn}</div>
                        </div>
                    </div>
                    <div class="surah-meta">${surah.ayahs} آيات</div>
                `;
                
                li.addEventListener('click', () => loadSurah(surah.number));
                surahListEl.appendChild(li);
            });
        }

        // Load and display Surah
        function loadSurah(surahNumber) {
            currentSurah = surahNumber;
            currentAyah = 1;
            
            const surah = quranData[surahNumber - 1];
            const surahInfo = surahList[surahNumber - 1];
            const readingArea = document.getElementById('reading-area');
            
            // Update active surah in sidebar
            document.querySelectorAll('.surah-item').forEach((item, index) => {
                item.classList.toggle('active', index === surahNumber - 1);
            });
            
            let html = `
                <div class="surah-header">
                    <h2>${surahInfo.nameAr}</h2>
                    <div class="surah-details">
                        <span>${surahInfo.nameEn}</span>
                        <span>•</span>
                        <span>${surahInfo.type}</span>
                        <span>•</span>
                        <span>${surahInfo.ayahs} Verses</span>
                    </div>
                </div>
            `;
            
            // Add Bismillah (except for Surah 1 and 9)
            if (surahNumber !== 1 && surahNumber !== 9) {
                html += `<div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
            }
            
            // Add Ayahs
            surah.ayahs.forEach((ayah, index) => {
                const ayahNumber = index + 1;
                html += `
                    <div class="ayah-container" data-ayah="${ayahNumber}">
                        <div class="ayah" onclick="playAyah(${surahNumber}, ${ayahNumber})">

                        <div class="ayah-actions">
                            <button class="ayah-action-btn" onclick="bookmarkAyah(${surahNumber}, ${ayahNumber})">🔖 Bookmark</button>
                            <button class="ayah-action-btn" onclick="playAyah(${surahNumber}, ${ayahNumber})">▶ Play</button>
                        </div>
                    </div>
                `;
            });
            
            readingArea.innerHTML = html;
            readingArea.scrollTop = 0;
        }

        // Play specific Ayah
        function playAyah(surahNumber, ayahNumber) {
            currentSurah = surahNumber;
            currentAyah = ayahNumber;
            
            // Highlight current ayah
            document.querySelectorAll('.ayah').forEach(el => el.classList.remove('playing'));
            const ayahEl = document.querySelector(`.ayah-container[data-ayah="${ayahNumber}"] .ayah`);
            if (ayahEl) {
                ayahEl.classList.add('playing');
                ayahEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            // Load and play audio
            const paddedSurah = String(surahNumber).padStart(3, '0');
            const paddedAyah = String(ayahNumber).padStart(3, '0');
            const audioUrl = `https://cdn.islamic.network/quran/audio-surah/128/${currentReciter}/${paddedSurah}/${paddedAyah}.mp3`;
            
            audioElement.src = audioUrl;
            audioElement.playbackRate = parseFloat(document.getElementById('speed-select').value);
            audioElement.play();
            isPlaying = true;
            
            // Update player UI
            document.getElementById('audio-player').classList.add('active');
            document.getElementById('play-pause-btn').innerHTML = '⏸';
            document.getElementById('player-surah').textContent = surahList[surahNumber - 1].nameAr;
            
            // Auto-play next ayah
            audioElement.onended = () => {
                playNextAyah();
            };
        }

        // Play/Pause
        document.getElementById('play-pause-btn').addEventListener('click', () => {
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                document.getElementById('play-pause-btn').innerHTML = '▶';
            } else {
                if (!audioElement.src) {
                    playAyah(currentSurah, currentAyah);
                } else {
                    audioElement.play();
                    isPlaying = true;
                    document.getElementById('play-pause-btn').innerHTML = '⏸';
                }
            }
        });

        // Previous Ayah
        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentAyah > 1) {
                playAyah(currentSurah, currentAyah - 1);
            } else if (currentSurah > 1) {
                playAyah(currentSurah - 1, surahList[currentSurah - 2].ayahs);
            }
        });

        // Next Ayah
        document.getElementById('next-btn').addEventListener('click', () => {
            playNextAyah();
        });

        function playNextAyah() {
            const currentSurahData = surahList[currentSurah - 1];
            if (currentAyah < currentSurahData.ayahs) {
                playAyah(currentSurah, currentAyah + 1);
            } else if (currentSurah < 114) {
                playAyah(currentSurah + 1, 1);
            } else {
                // End of Quran
                audioElement.pause();
                isPlaying = false;
                document.getElementById('play-pause-btn').innerHTML = '▶';
                showToast('Quran recitation completed. May Allah accept it from you.');
            }
        }

        // Progress bar
        audioElement.addEventListener('timeupdate', () => {
            const progress = (audioElement.currentTime / audioElement.duration) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('current-time').textContent = formatTime(audioElement.currentTime);
            document.getElementById('total-time').textContent = formatTime(audioElement.duration);
        });

        document.getElementById('progress-bar').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = percent * audioElement.duration;
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Reciter selection
        document.getElementById('reciter-select').addEventListener('change', (e) => {
            currentReciter = e.target.value;
            if (isPlaying) {
                const currentTime = audioElement.currentTime;
                playAyah(currentSurah, currentAyah);
                audioElement.currentTime = currentTime;
            }
        });

        // Speed control
        document.getElementById('speed-select').addEventListener('change', (e) => {
            audioElement.playbackRate = parseFloat(e.target.value);
        });

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-toggle');
            icon.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        });

        // Bookmarks
        function bookmarkAyah(surahNumber, ayahNumber) {
            const surah = quranData[surahNumber - 1];
            const ayah = surah.ayahs[ayahNumber - 1];
            
            const bookmark = {
                surah: surahNumber,
                ayah: ayahNumber,
                text: ayah.text,
                surahName: surahList[surahNumber - 1].nameAr
            };
            
            // Check if already bookmarked
            const exists = bookmarks.findIndex(b => b.surah === surahNumber && b.ayah === ayahNumber);
            if (exists === -1) {
                bookmarks.push(bookmark);
                localStorage.setItem('quranBookmarks', JSON.stringify(bookmarks));
                showToast('Verse bookmarked successfully');
                renderBookmarks();
            } else {
                showToast('Verse already bookmarked');
            }
        }

        function renderBookmarks() {
            const bookmarksList = document.getElementById('bookmarks-list');
            
            if (bookmarks.length === 0) {
                bookmarksList.innerHTML = '<p style="opacity: 0.7; text-align: center; padding: 20px;">No bookmarks yet</p>';
                return;
            }
            
            bookmarksList.innerHTML = bookmarks.map(bookmark => `
                <div class="bookmark-item" onclick="loadSurah(${bookmark.surah}); document.getElementById('bookmarks-panel').classList.remove('active');">
                    <div class="bookmark-text">${bookmark.text.substring(0, 100)}...</div>
                    <div class="bookmark-reference">${bookmark.surahName} - Verse ${bookmark.ayah}</div>
                </div>
            `).join('');
        }

        document.getElementById('bookmarks-btn').addEventListener('click', () => {
            document.getElementById('bookmarks-panel').classList.add('active');
            renderBookmarks();
        });

        document.getElementById('close-bookmarks').addEventListener('click', () => {
            document.getElementById('bookmarks-panel').classList.remove('active');
        });

        // Settings
        document.getElementById('settings-btn').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.add('active');
        });

        document.getElementById('close-settings').addEventListener('click', () => {
            document.getElementById('settings-modal').classList.remove('active');
        });

        document.getElementById('settings-modal').addEventListener('click', (e) => {
            if (e.target.id === 'settings-modal') {
                document.getElementById('settings-modal').classList.remove('active');
            }
        });

        // Font size control
        document.getElementById('font-size-slider').addEventListener('input', (e) => {
            const size = e.target.value;
            document.querySelectorAll('.ayah').forEach(el => {
                el.style.fontSize = size + 'px';
            });
        });

        // Search
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if (query.length < 2) {
                document.querySelectorAll('.surah-item').forEach(item => item.style.display = 'flex');
                return;
            }
            
            document.querySelectorAll('.surah-item').forEach((item, index) => {
                const surah = surahList[index];
                const matches = 
                    surah.nameAr.includes(query) ||
                    surah.nameEn.toLowerCase().includes(query) ||
                    String(surah.number).includes(query);
                
                item.style.display = matches ? 'flex' : 'none';
            });
        });

        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Initialize app
        loadQuranData();
    </script>
</body>
</html>
